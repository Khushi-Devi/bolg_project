{% extends 'blog/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card" style="border-radius: 12px; border: 1px solid #e2e8f0; background: white; overflow: hidden;">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center mb-4" style="color: #1a1f36; font-weight: 600;">Create New Post</h3>

                <form method="POST" enctype="multipart/form-data" id="postForm">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="id_title" class="form-label" style="font-weight: 500; color: #1a1f36; margin-bottom: 0.5rem;">Title</label>
                        <input type="text" name="title" id="id_title" class="form-control" maxlength="200" required
                               style="border-radius: 6px; border: 1px solid #cbd5e1; padding: 0.6rem 1rem; width: 100%;"
                               placeholder="Enter your post title...">
                        <small class="text-muted" id="titleCounter" style="font-size: 0.75rem; margin-top: 0.25rem; display: block;">0/200 characters</small>
                    </div>

                    <div class="mb-4">
                        <label for="id_content" class="form-label" style="font-weight: 500; color: #1a1f36; margin-bottom: 0.5rem;">Content</label>
                        <textarea name="content" id="id_content" class="form-control" rows="10" required
                                  style="border-radius: 6px; border: 1px solid #cbd5e1; padding: 0.6rem 1rem; width: 100%; resize: vertical;"
                                  placeholder="Write your thoughts here..."></textarea>
                        <small class="text-muted" id="contentCounter" style="font-size: 0.75rem; margin-top: 0.25rem; display: block;">0 characters</small>
                    </div>

                    <div class="mb-4">
                        <label for="id_image" class="form-label" style="font-weight: 500; color: #1a1f36; margin-bottom: 0.5rem;">Featured Image (Optional)</label>
                        <input type="file" name="image" id="id_image" class="form-control" accept="image/*"
                               style="border-radius: 6px; border: 1px solid #cbd5e1; padding: 0.6rem 1rem; width: 100%;">
                        <div id="imagePreview" style="margin-top: 1rem; display: none;">
                            <img id="previewImg" src="#" alt="Preview" style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.25rem;">
                        </div>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 1; padding: 0.7rem;">
                            <span id="btnText">Publish Post</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm" style="display: none; margin-left: 0.5rem;" role="status"></span>
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary" style="flex: 0.5; padding: 0.7rem; border-radius: 6px; text-align: center; text-decoration: none;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        outline: none;
    }
    
    .btn-outline-secondary {
        border: 1px solid #cbd5e1;
        color: #475569;
        background: white;
    }
    
    .btn-outline-secondary:hover {
        background: #f8fafc;
        border-color: #94a3b8;
        color: #1a1f36;
    }
    
    .btn-primary {
        background: #3b82f6;
        border: none;
    }
    
    .btn-primary:hover {
        background: #2563eb;
    }
</style>

<script>
    const titleInput = document.getElementById('id_title');
    const titleCounter = document.getElementById('titleCounter');
    
    if (titleInput) {
        titleInput.addEventListener('input', function() {
            const count = this.value.length;
            titleCounter.textContent = `${count}/200 characters`;
            if (count > 180) {
                titleCounter.style.color = '#ef4444';
            } else {
                titleCounter.style.color = '#64748b';
            }
        });
    }
    
    const contentInput = document.getElementById('id_content');
    const contentCounter = document.getElementById('contentCounter');
    
    if (contentInput) {
        contentInput.addEventListener('input', function() {
            const count = this.value.length;
            contentCounter.textContent = `${count} characters`;
            if (count > 5000) {
                contentCounter.style.color = '#ef4444';
            } else {
                contentCounter.style.color = '#64748b';
            }
        });
    }
    
    const imageInput = document.getElementById('id_image');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    
    if (imageInput) {
        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                imagePreview.style.display = 'none';
                previewImg.src = '';
            }
        });
    }
    
    const form = document.getElementById('postForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    if (form) {
        form.addEventListener('submit', function() {
            submitBtn.disabled = true;
            btnText.textContent = 'Publishing...';
            btnSpinner.style.display = 'inline-block';
            submitBtn.style.opacity = '0.7';
        });
    }
</script>

{% endblock %}
