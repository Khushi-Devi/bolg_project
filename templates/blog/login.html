{% extends 'blog/base.html' %}
{% block content %}

<div class="row justify-content-center" style="min-height: 70vh; align-items: center;">
    <div class="col-md-6 col-lg-5">
        
        <div class="card" style="border-radius: 16px; border: 1px solid #e2e8f0; background: white; padding: 2rem;">
            
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="color: #1a1f36; font-weight: 600; margin-bottom: 0.5rem;">Welcome back</h2>
                <p style="color: #64748b; font-size: 0.9rem;">Sign in to your account</p>
                <div style="width: 50px; height: 2px; background: #3b82f6; margin: 1rem auto 0 auto;"></div>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div style="margin-bottom: 1.25rem;">
                    <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #1a1f36; font-size: 0.85rem;">Username</label>
                    <input type="text" 
                           name="username" 
                           id="username"
                           placeholder="Enter your username" 
                           class="form-control" 
                           required
                           style="width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.9rem;">
                </div>

                <!-- Password Field -->
                <div style="margin-bottom: 1rem;">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #1a1f36; font-size: 0.85rem;">Password</label>
                    <input type="password" 
                           name="password" 
                           id="password"
                           placeholder="Enter your password" 
                           class="form-control" 
                           required
                           style="width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.9rem;">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" name="remember" style="width: 16px; height: 16px; cursor: pointer;">
                        <span style="color: #475569; font-size: 0.85rem;">Remember me</span>
                    </label>
                    <a href="#" style="color: #3b82f6; text-decoration: none; font-size: 0.85rem;">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%; padding: 0.75rem; border-radius: 8px; font-weight: 500;">
                    <span id="btnText">Sign in</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm" style="display: none; margin-left: 0.5rem;" role="status"></span>
                </button>

                <!-- Sign Up Link -->
                <div style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
                    <p style="color: #64748b; font-size: 0.85rem; margin: 0;">
                        Don't have an account? 
                        <a href="{% url 'signup' %}" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Create account</a>
                    </p>
                </div>
            </form>
        </div>
        
    </div>
</div>

<style>
    .form-control:focus {
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        outline: none;
    }
</style>

<script>
    // Loading spinner on form submit
    const form = document.querySelector('form');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    if (form) {
        form.addEventListener('submit', function() {
            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            btnSpinner.style.display = 'inline-block';
            loginBtn.style.opacity = '0.7';
        });
    }
</script>

{% endblock %}
